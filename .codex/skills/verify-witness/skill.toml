# Codex skill: verify a harness's Ed25519 witness manifest.
#
# Wraps the `harness verify` subcommand. Distinct from `validate-harness`
# (the iter-22 umbrella) because it focuses ONLY on signature checking —
# useful inside CI / federation handshakes where you want a fast yes/no
# on "did the publisher sign this exact file set?"

[skill]
name = "verify-witness"
version = "0.1.0"
description = "Verify the Ed25519 witness manifest of a scaffolded harness. Fast yes/no signature check that proves the publisher signed this exact file set — separate from the full release-readiness umbrella in validate-harness."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/ruvnet/agent-harness-generator"
license = "MIT"

[dispatch]
type = "mcp_tool"
server = "agent-harness-generator"
tool = "verify_witness"

[command]
name = "verify-witness"
synopsis = "Verify Ed25519 witness manifest of a harness directory"

[[args]]
name = "path"
prompt = "Path to the harness directory"
default = "."

[[args]]
name = "strict"
prompt = "Fail if no witness.json is present (vs. soft-skip)?"
default = "true"
choices = ["true", "false"]

[catalog]
tags = ["witness", "ed25519", "signature", "verification", "federation", "ci"]
